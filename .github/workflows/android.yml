name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Поднимаем Java до 21, так как Gradle 9.x требует свежую Java
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    # Скачиваем и генерируем обертку Gradle 9.3.1
    - name: Generate Gradle 9.3.1 Wrapper and Build
      run: |
        # Находим, где лежит build.gradle.kts
        PROJECT_DIR=$(dirname $(find . -name "build.gradle.kts" -print -quit))
        echo "Проект обнаружен в: $PROJECT_DIR"
        
        cd "$PROJECT_DIR"
        
        # Скачиваем дистрибутив Gradle 9.3.1 напрямую
        wget https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -O gradle-dist.zip
        unzip -q gradle-dist.zip
        
        # Разворачиваем wrapper нужной версии
        ./gradle-9.3.1/bin/gradle wrapper --gradle-version 9.
