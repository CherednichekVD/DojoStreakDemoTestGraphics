name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Даем права на исполнение градлу везде, где он может быть
    - name: Grant execute permission for gradlew
      run: |
        chmod +x ./gradlew || chmod +x ./app/gradlew || true

    # Запускаем сборку из корня, а если не выходит — пробуем из папки app
    - name: Build with Gradle
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug --stacktrace
        elif [ -f "./app/gradlew" ]; then
          ./app/gradlew assembleDebug --stacktrace
        else
          echo "Gradlew not found!" && exit 1
        fi

    # Ищем APK по маске в любых подпапках
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DojoStreak-APK
        path: "**/build/outputs/apk/debug/*.apk"
