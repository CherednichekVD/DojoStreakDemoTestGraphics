name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Устанавливаем Gradle на сервер вручную, так как в репозитории его нет
    - name: Install Gradle Setup
      run: |
        sudo apt-get update
        sudo apt-get install -y gradle

    # Генерируем gradlew прямо внутри папки, где лежит build.gradle.kts
    - name: Generate Gradle Wrapper and Build
      run: |
        # Находим папку, где лежит файл build.gradle.kts (наш проект)
        PROJECT_DIR=$(dirname $(find . -name "build.gradle.kts" -print -quit))
        echo "Проект обнаружен в: $PROJECT_DIR"
        
        cd "$PROJECT_DIR"
        # Генерируем файлы сборщика заново
        gradle wrapper
        
        # Даем права и запускаем компиляцию APK
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace

    # Универсальный поиск готового APK во всех папках проекта
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DojoStreak-APK
        path: "**/build/outputs/apk/debug/*.apk"
