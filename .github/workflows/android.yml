name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Генерируем современный Gradle Wrapper (8.7), который понимает Java 17
    - name: Generate Modern Gradle Wrapper and Build
      run: |
        # Находим, где лежит build.gradle.kts
        PROJECT_DIR=$(dirname $(find . -name "build.gradle.kts" -print -quit))
        echo "Проект обнаружен в: $PROJECT_DIR"
        
        cd "$PROJECT_DIR"
        
        # Скачиваем официальный дистрибутив Gradle 8.7 напрямую, минуя старый apt-get
        wget https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle-dist.zip
        unzip -q gradle-dist.zip
        
        # Используем скачанный современный gradle для создания правильного wrapper
        ./gradle-8.7/bin/gradle wrapper --gradle-version 8.7
        
        # Теперь запускаем сборку через созданный локальный gradlew
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace

    # Сохраняем готовый APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DojoStreak-APK
        path: "**/build/outputs/apk/debug/*.apk"
