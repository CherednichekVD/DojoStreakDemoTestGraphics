name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Автоматический поиск папки с проектом и сборка
    - name: Find Gradlew and Build APK
      run: |
        # Ищем, где лежит файл gradlew в репозитории
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Критическая ошибка: файл gradlew вообще не найден в репозитории!"
          exit 1
        fi
        
        # Получаем чистый путь к папке, где лежит gradlew
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        echo "Проект найден в папке: $GRADLE_DIR"
        
        # Переходим туда, даем права и собираем
        cd "$GRADLE_DIR"
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace

    # Универсальный поиск и выгрузка готового APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DojoStreak-APK
        path: "**/build/outputs/apk/debug/*.apk"
